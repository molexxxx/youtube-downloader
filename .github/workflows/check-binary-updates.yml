name: Check binary updates

# Runs daily and on-demand. Compares the latest upstream yt-dlp and ffmpeg
# versions against the ones last recorded in .github/binary-versions.json.
# When either publishes a new version it bumps the app patch version and pushes
# an annotated tag, which triggers release.yml to build and publish.
#
# Only real, stable upstream version numbers are tracked. The Windows/Linux
# ffmpeg builds (BtbN) are rolling master autobuilds with no stable version:
# every identifying field (published_at, asset updated_at, release name) moves
# on every rebuild, so tracking them cut a pointless release every single day.
# They are deliberately not a trigger. Fresh installs and the in-app updater
# always fetch the newest BtbN master regardless of the app version, so nothing
# is lost by leaving them out.

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: check-binary-updates
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # GH_TOKEN (a PAT) rather than the default GITHUB_TOKEN: pushes made with
      # GITHUB_TOKEN cannot trigger another workflow, and the tag push below has
      # to start release.yml.
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Configure git identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Fetch latest upstream versions
        id: versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # yt-dlp: one versioned release tag covers all platforms.
          YTDLP=$(gh api repos/yt-dlp/yt-dlp/releases/latest --jq '.tag_name')

          # ffmpeg: evermeet.cx follows upstream ffmpeg releases and reports a
          # real semantic version (e.g. 8.1.2). Used as the cross-platform
          # "a new ffmpeg was released" signal for every platform.
          FFMPEG=$(curl -fsSL https://evermeet.cx/ffmpeg/info/ffmpeg/release | jq -r '.version')

          # Fail loudly instead of writing "null" into the tracking file, which
          # would cut a bogus release on the next run.
          for pair in "yt-dlp:$YTDLP" "ffmpeg:$FFMPEG"; do
            name="${pair%%:*}"
            value="${pair#*:}"
            if [[ -z "$value" || "$value" == "null" ]]; then
              echo "::error::Could not resolve the latest $name version"
              exit 1
            fi
          done

          echo "yt-dlp latest: $YTDLP"
          echo "ffmpeg latest: $FFMPEG"

          echo "ytdlp=$YTDLP"   >> "$GITHUB_OUTPUT"
          echo "ffmpeg=$FFMPEG" >> "$GITHUB_OUTPUT"

      - name: Compare versions and release if updated
        env:
          YTDLP_NEW: ${{ steps.versions.outputs.ytdlp }}
          FFMPEG_NEW: ${{ steps.versions.outputs.ffmpeg }}
        run: |
          set -euo pipefail

          FILE=".github/binary-versions.json"

          write_versions() {
            printf '{\n  "ytdlp": "%s",\n  "ffmpeg": "%s"\n}\n' \
              "$YTDLP_NEW" "$FFMPEG_NEW" > "$FILE"
          }

          # First run: create the tracking file without bumping the app version.
          if [[ ! -f "$FILE" ]]; then
            echo "No tracking file found - initializing with current versions (no release bump)."
            write_versions
            git add "$FILE"
            git commit -m "chore(ci): initialize binary version tracking [skip ci]"
            git push origin HEAD:main
            exit 0
          fi

          YTDLP_OLD=$(jq -r '.ytdlp // ""' "$FILE")
          FFMPEG_OLD=$(jq -r '.ffmpeg // ""' "$FILE")

          if [[ "$YTDLP_NEW" == "$YTDLP_OLD" && "$FFMPEG_NEW" == "$FFMPEG_OLD" ]]; then
            echo "yt-dlp $YTDLP_OLD and ffmpeg $FFMPEG_OLD are current - no release needed."
            echo "No binary updates. Nothing to release." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Record exactly what moved; this becomes the release notes body.
          CHANGES=""
          if [[ "$YTDLP_NEW" != "$YTDLP_OLD" ]]; then
            echo "yt-dlp: $YTDLP_OLD -> $YTDLP_NEW"
            CHANGES+="- **yt-dlp** \`${YTDLP_OLD:-none}\` -> \`$YTDLP_NEW\`"$'\n'
          fi
          if [[ "$FFMPEG_NEW" != "$FFMPEG_OLD" ]]; then
            echo "ffmpeg: $FFMPEG_OLD -> $FFMPEG_NEW"
            CHANGES+="- **ffmpeg** \`${FFMPEG_OLD:-none}\` -> \`$FFMPEG_NEW\`"$'\n'
          fi

          write_versions
          new_version=$(npm version patch --no-git-tag-version)

          git add "$FILE" package.json package-lock.json
          git commit -m "chore(release): $new_version [skip ci]"

          # Annotated tag, not lightweight: a lightweight tag is skipped by
          # --follow-tags and never reaches origin, which is why earlier bumps
          # (v1.4.6 to v1.4.10) landed on main but never released. The message
          # body is what release.yml lifts into the release notes.
          TAG_MESSAGE=$(printf 'chore(release): %s\n\n## Automated binary update\n\nThis release was published automatically because a bundled tool shipped a new version:\n\n%s' \
            "$new_version" "$CHANGES")
          # --cleanup=verbatim is required: the default mode strips lines
          # starting with '#', which would silently eat the markdown heading
          # that release.yml keys off.
          git tag -a "$new_version" --cleanup=verbatim -m "$TAG_MESSAGE"

          git push origin HEAD:main
          git push origin "refs/tags/$new_version"

          {
            echo "## Released $new_version"
            echo
            echo "$CHANGES"
          } >> "$GITHUB_STEP_SUMMARY"
